<svg width="520" height="196" viewBox="0 0 520 196" xmlns="http://www.w3.org/2000/svg">
  <rect width="520" height="196" rx="8" fill="#24273a"/>
  <rect width="520" height="36" rx="8" fill="#1e2030"/>
  <rect y="28" width="520" height="8" fill="#1e2030"/>
  <circle cx="20" cy="18" r="6" fill="#ed8796"/>
  <circle cx="40" cy="18" r="6" fill="#eed49f"/>
  <circle cx="60" cy="18" r="6" fill="#a6da95"/>
  <text x="260" y="23" font-family="Hack Nerd Font Mono, monospace" font-size="12" fill="#a5adcb" text-anchor="middle">Macchiato</text>

  <!-- prompt 1: full git status + success -->
  <text y="74" font-family="Hack Nerd Font Mono, monospace" font-size="14">
    <tspan x="24" fill="#8aadf4">~/dev/pure-catppuccin</tspan><tspan fill="#c6a0f6"> main</tspan><tspan fill="#f4dbd6"> rebase</tspan><tspan fill="#7dc4e4"> ⇡</tspan><tspan fill="#eed49f"> *</tspan><tspan fill="#5b6078"> ≡</tspan>
  </text>
  <text x="496" y="74" text-anchor="end" font-family="Hack Nerd Font Mono, monospace" font-size="14" fill="#f5a97f">5s</text>
  <text x="24" y="98" font-family="Hack Nerd Font Mono, monospace" font-size="14" fill="#a6da95">❯</text>

  <!-- continuation prompt -->
  <text y="122" font-family="Hack Nerd Font Mono, monospace" font-size="14">
    <tspan x="24" fill="#5b6078">·</tspan><tspan fill="#cad3f5"> git commit -m </tspan><tspan fill="#a6da95">'feat: add feature'</tspan>
  </text>

  <!-- prompt 2: error state -->
  <text y="154" font-family="Hack Nerd Font Mono, monospace" font-size="14">
    <tspan x="24" fill="#8aadf4">~/dev/pure-catppuccin</tspan><tspan fill="#c6a0f6"> main</tspan>
  </text>
  <text x="24" y="178" font-family="Hack Nerd Font Mono, monospace" font-size="14" fill="#ed8796">❯</text>
</svg>