name: Generate styles

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          run_install: true

      - run: pnpm generate
      - run: pnpm preview

      - name: Commit changes
        run: |
          git add style/ img/
          git diff --quiet --cached && exit 0
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: regenerate styles and previews [skip ci]"
          git push
